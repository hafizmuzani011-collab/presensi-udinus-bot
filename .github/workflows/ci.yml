name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx flask

      - name: Syntax check
        run: |
          failed=0
          for f in *.py; do
            if python -m py_compile "$f" 2>/dev/null; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f"
              python -m py_compile "$f" 2>&1 | head -5
              failed=1
            fi
          done
          exit $failed

      - name: Install test deps
        run: pip install pytest httpx flask edge-tts

      - name: Run tests
        run: python -m pytest test/ --tb=short -q
        env:
          TELEGRAM_BOT_TOKEN: test
          KULINO_SAYA_NIM: test
          KULINO_SAYA_PASS: test
          KULINO_PACAR_NIM: test
          KULINO_PACAR_PASS: test
          MHS_SAYA_NIM: test
          MHS_SAYA_PASS: test
          MHS_PACAR_NIM: test
          MHS_PACAR_PASS: test
          DASH_TOKEN: test

      - name: Generate summary
        if: always()
        run: |
          echo "### CI Result" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
